<div class="header">
  <div>
    <h1>{{ isEdit ? 'Editar género' : 'Nuevo género' }}</h1>
    <p>Complete los datos obligatorios</p>
  </div>
</div>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="save()">
      <mat-form-field appearance="outline">
        <mat-label>Descripción</mat-label>
        <input matInput formControlName="description" maxlength="100">
        @if (form.controls.description.hasError('required')) {
          <mat-error>La descripción es obligatoria</mat-error>
        }
      </mat-form-field>

      @if (error) {
        <p class="error">{{ error }}</p>
      }

      <div class="buttons">
        <a mat-button routerLink="/admin/genres">Cancelar</a>
        <button mat-flat-button color="primary" type="submit" [disabled]="loading">
          <mat-icon>save</mat-icon>
          Guardar
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>
