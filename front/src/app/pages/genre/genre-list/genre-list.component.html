<div class="header">
  <div>
    <h1>Géneros</h1>
    <p>Listado de géneros registrados</p>
  </div>
  <a mat-flat-button color="primary" routerLink="/admin/genres/new">
    <mat-icon>add</mat-icon>
    Nuevo género
  </a>
</div>

@if (error()) {
  <p class="error">{{ error() }}</p>
}

@if (loading()) {
  <div class="loading"><mat-spinner diameter="42"></mat-spinner></div>
} @else {
  <div class="table-box">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let item">{{ item.id }}</td>
      </ng-container>

      <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descripción</th>
        <td mat-cell *matCellDef="let item">{{ item.description }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let item">
          <a mat-icon-button color="primary" [routerLink]="['/admin/genres/edit', item.id]" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </a>
          <button mat-icon-button color="warn" type="button" (click)="deleteGenre(item)" aria-label="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator
      [length]="totalElements"
      [pageIndex]="pageIndex"
      [pageSize]="pageSize"
      [pageSizeOptions]="[1, 5, 10, 20]"
      (page)="changePage($event)">
    </mat-paginator>
  </div>
}
