<div class="header">
  <div>
    <h1>Obras</h1>
    <p>Listado de obras registradas</p>
  </div>
  <a mat-flat-button color="primary" routerLink="/admin/plays/new">
    <mat-icon>add</mat-icon>
    Nueva obra
  </a>
</div>

@if (error()) {
  <p class="error">{{ error() }}</p>
}

@if (loading()) {
  <div class="loading"><mat-spinner diameter="42"></mat-spinner></div>
} @else {
  <div class="table-box">
    <table mat-table [dataSource]="dataSource">
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let item">{{ item.id }}</td>
      </ng-container>

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Título</th>
        <td mat-cell *matCellDef="let item">{{ item.title }}</td>
      </ng-container>

      <ng-container matColumnDef="genreDescription">
        <th mat-header-cell *matHeaderCellDef>Género</th>
        <td mat-cell *matCellDef="let item">{{ item.genreDescription }}</td>
      </ng-container>

      <ng-container matColumnDef="durationMinutes">
        <th mat-header-cell *matHeaderCellDef>Duración</th>
        <td mat-cell *matCellDef="let item">{{ item.durationMinutes }} min</td>
      </ng-container>

      <ng-container matColumnDef="active">
        <th mat-header-cell *matHeaderCellDef>Activo</th>
        <td mat-cell *matCellDef="let item">{{ item.active ? 'Si' : 'No' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let item">
          <a mat-icon-button color="primary" [routerLink]="['/admin/plays/edit', item.id]" aria-label="Editar">
            <mat-icon>edit</mat-icon>
          </a>
          <button mat-icon-button color="warn" type="button" (click)="deletePlay(item)" aria-label="Eliminar">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <mat-paginator
      [length]="totalElements"
      [pageIndex]="pageIndex"
      [pageSize]="pageSize"
      [pageSizeOptions]="[1, 5, 10, 20]"
      (page)="changePage($event)">
    </mat-paginator>
  </div>
}
