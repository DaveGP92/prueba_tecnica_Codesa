services:
  db:
    image: postgres:15-alpine
    container_name: codesa-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./dump-db_codesa-202607201636.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-db_codesa}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: codesa-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-db_codesa}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      JWT_SECRET: ${JWT_SECRET:-Q29kZXNhUHJ1ZWJhVGVjbmljYVNlY3JldEtleUZvckpXVA==}
    ports:
      - "8080:8080"

  frontend:
    build: ./front
    container_name: codesa-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
